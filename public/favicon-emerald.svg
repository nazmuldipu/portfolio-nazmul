  <line x1="48" y1="12" x2="48" y2="52" stroke="#FCFBF8" stroke-width="6.5" stroke-linecap="round"/>
  <line x1="16" y1="12" x2="48" y2="52" stroke="#E6A93A" stroke-width="6.5" stroke-linecap="round"/>
</svg>
