<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- indigo rounded-square badge -->
  <rect width="64" height="64" rx="13" fill="#3b4cca"/>
  <!-- left vertical — thick (pen-nib downstroke) -->
  <line x1="16" y1="12" x2="16" y2="52" stroke="white" stroke-width="7.5" stroke-linecap="round"/>
  <!-- diagonal — thin (pen-nib upstroke, calligraphic contrast) -->
  <line x1="16" y1="12" x2="48" y2="52" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- right vertical — thick (pen-nib downstroke) -->
  <line x1="48" y1="12" x2="48" y2="52" stroke="white" stroke-width="7.5" stroke-linecap="round"/>
</svg>
